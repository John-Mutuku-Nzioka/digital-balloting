<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | Digital Balloting System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --gold: #c9a84c;
    --cream: #faf8f3;
    --paper: #f5f0e8;
    --red-seal: #8b1a1a;
    --green: #1a5c1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px);
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 10;
    background: var(--paper);
    width: 440px;
    max-width: 95vw;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.3);
  }
  .card-top {
    background: var(--ink);
    padding: 24px 36px;
    border-bottom: 2px solid var(--gold);
  }
  .card-top h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 4px;
  }
  .card-top p { font-size: 13px; color: rgba(250,248,243,0.45); }
  .card-body { padding: 28px 36px 36px; position: relative; }
  .card-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(transparent, transparent 27px, rgba(26,26,46,0.03) 27px, rgba(26,26,46,0.03) 28px);
    pointer-events: none;
  }
  .alert {
    padding: 11px 14px;
    border-radius: 3px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
    border-left: 3px solid;
    position: relative;
    z-index: 1;
  }
  .alert-error { background: rgba(139,26,26,0.08); color: var(--red-seal); border-color: var(--red-seal); }
  .alert-success { background: rgba(26,92,26,0.08); color: var(--green); border-color: var(--green); }
  .form-group {
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }
  .form-group label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(26,26,46,0.45);
    margin-bottom: 7px;
  }
  .form-group input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(26,26,46,0.12);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: all 0.15s;
  }
  .form-group input:focus {
    background: white;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    z-index: 1;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--ink); }
  .btn span { position: relative; z-index: 1; }
  .back-link {
    display: block;
    text-align: center;
    font-size: 12px;
    color: rgba(26,26,46,0.4);
    text-decoration: none;
    position: relative;
    z-index: 1;
  }
  .back-link:hover { color: var(--ink); }
  .voter-info {
    font-size: 13px;
    color: rgba(26,26,46,0.5);
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .voter-info strong { color: var(--ink); }
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <h2>Change Password</h2>
    <p>Update your voting system password</p>
  </div>
  <div class="card-body">
    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>
    <p class="voter-info">Logged in as <strong id="voterNameDisplay">Voter</strong></p>
    <form id="changePasswordForm">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="currentPassword" placeholder="Enter current password" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Minimum 8 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn"><span>Update Password →</span></button>
    </form>
    <a href="ballot.html" class="back-link">← Back to ballot</a>
  </div>
</div>

<script>
const API = 'https://digital-balloting-production1.up.railway.app/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

function parseJWT(t) {
  try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; }
}
const payload = parseJWT(token);
if (!payload || payload.role !== 'voter') window.location.href = 'login.html';

document.getElementById('voterNameDisplay').textContent =
  localStorage.getItem('voterName') || 'Voter';

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const current_password = document.getElementById('currentPassword').value;
  const new_password = document.getElementById('newPassword').value;
  const confirm_password = document.getElementById('confirmPassword').value;

  if (new_password !== confirm_password)
    return showError('New passwords do not match.');
  if (new_password.length < 8)
    return showError('New password must be at least 8 characters.');
  if (current_password === new_password)
    return showError('New password must be different from current password.');

  try {
    const res = await fetch(`${API}/vote/change-password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ current_password, new_password })
    });
    const data = await res.json();
    if (!res.ok) return showError(data.message);
    showSuccess('Password changed successfully! Redirecting...');
    setTimeout(() => window.location.href = 'ballot.html', 2000);
  } catch {
    showError('Network error. Please try again.');
  }
});
</script>
</body>
</html>
